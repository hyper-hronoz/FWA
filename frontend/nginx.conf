server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /videos/ {
        autoindex on;
    }

    location ~* \.(mp4|webm|ogg)$ {
        add_header Access-Control-Allow-Origin *;
    }
}
