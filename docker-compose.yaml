services:
  db:
    image: mysql:9.2
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql/init:/docker-entrypoint-initdb.d


  service-auth:
    build: ./backend/services/service-auth
    ports:
      - "3001:3001"
    depends_on:
      - db
    env_file:
      - .env


  service-girls:
    build: ./backend/services/service-girls
    ports:
      - "3002:3002"
    volumes:
      - ./backend/static:/app/static
    depends_on:
      - db
    env_file:
      - .env


  service-users:
    build: ./backend/services/service-users
    ports:
      - "3003:3003"
    depends_on:
      - db
    env_file:
      - .env


  service-gateway:
    build: ./backend/service-gateway
    ports:
      - "3000:3000"
    volumes:
    - ./backend/static:/app/static 
    depends_on:
      - service-auth
      - service-users
      - service-girls

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: react_frontend_nginx
    ports:
      - "80:80"
      # PORT CHANGE REQUIRED!
      # - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./logs/frontend:/var/log/nginx
      - ./backend/static/videos:/usr/share/nginx/html/videos
    depends_on:
      - service-auth

volumes:
  mysql_data:
