services:
  db:
    image: mysql:9.2
    restart: always
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./logs/db:/var/log/mysql 

  service-auth:
    build: ./backend/services/service-auth/
    ports:
      - "3001:3001"
    depends_on:
      - db
    env_file:
      - ./.env
    volumes:
      - ./logs/backend:/app/logs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: react_frontend_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./logs/frontend:/var/log/nginx
      - ./backend/static/videos:/usr/share/nginx/html/videos
    depends_on:
      - service-auth

volumes:
  mysql_data:
